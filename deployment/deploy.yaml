apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-app
  namespace: food-app
  labels:
    app: food-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: food-app
  template:
    metadata:
      labels:
        app: food-app
    spec:
      containers:
        - name: food-app
          image: osirisguitar/food-app:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: food-app
  namespace: food-app
spec:
  selector:
    app: food-app
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: food-app
  namespace: food-app
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mat.bornholm.se
      secretName: mat.bornholm.se-tls
  rules:
    - host: mat.bornholm.se
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: food-app
                port:
                  number: 80
